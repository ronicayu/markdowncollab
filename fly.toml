app = "markdowncollab-ws"
primary_region = "sjc"

[build]
  dockerfile = "Dockerfile.ws"

[env]
  HOST = "0.0.0.0"
  PORT = "8080"
  YPERSISTENCE = "/data/yjs"

[http_service]
  internal_port = 8080
  force_https = true
  auto_stop_machines = "stop"
  auto_start_machines = true
  min_machines_running = 1

[mounts]
  source = "yjs_data"
  destination = "/data/yjs"
